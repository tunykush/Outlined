<!doctype html>
<html lang="en" data-screen-label="Brand intro video">
<head>
<meta charset="utf-8">
<title>Outlined · Brand intro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  html, body { margin: 0; background: #f5f4ed; color: #f0ede6; font-family: Inter, system-ui, sans-serif; min-height: 100vh; overflow: hidden; }
  .stage-host { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  i, em { font-style: normal; }
  /* Hide chrome when embedded as homepage hero (?embed=1) */
  body.embed { background: #f5f4ed; }
  body.embed .stage-host { min-height: 100vh; }
</style>
</head>
<body>
<div class="stage-host" id="root"></div>

<script>
  // Toggle embed mode early so the body class drives CSS before React renders.
  if (new URLSearchParams(window.location.search).get('embed') === '1') {
    document.body.classList.add('embed');
  }
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const PARCHMENT = '#f5f4ed';
const NEAR_BLACK = '#141413';
const TERRA = '#c96442';
const CORAL = '#d97757';
const IVORY = '#faf9f5';
const STONE = '#87867f';
const CHARCOAL = '#4d4c48';
const CREAM = '#f0eee6';

// ── Logo with draw-on animation ─────────────────────────────
function LogoDrawOn({ progress, scale = 1, color = NEAR_BLACK, accent = TERRA }) {
  const bracketP = Math.min(1, progress / 0.45);
  const circleP = Math.max(0, Math.min(1, (progress - 0.45) / 0.55));
  const bracketLen = 80;
  const circleC = 2 * Math.PI * 9;
  return (
    <svg width={220 * scale} height={160 * scale} viewBox="0 0 44 32" style={{ overflow: 'visible' }}>
      <path d="M8 4 L4 4 L4 28 L8 28" fill="none" stroke={accent} strokeWidth="2.6" strokeLinecap="square"
        strokeDasharray={bracketLen} strokeDashoffset={bracketLen * (1 - bracketP)} />
      <path d="M36 4 L40 4 L40 28 L36 28" fill="none" stroke={accent} strokeWidth="2.6" strokeLinecap="square"
        strokeDasharray={bracketLen} strokeDashoffset={bracketLen * (1 - bracketP)} />
      <circle cx="22" cy="16" r="9" fill="none" stroke={color} strokeWidth="2.6"
        strokeDasharray={circleC} strokeDashoffset={circleC * (1 - circleP)}
        transform="rotate(-90 22 16)" />
    </svg>
  );
}

// ── Camera helper ───────────────────────────────────────────
function Camera({ scale = 1, originX = '50%', originY = '50%', x = 0, y = 0, children, style = {} }) {
  return (
    <div style={{ position: 'absolute', inset: 0, transformOrigin: `${originX} ${originY}`, transform: `translate(${x}px, ${y}px) scale(${scale})`, willChange: 'transform', ...style }}>
      {children}
    </div>
  );
}

// ── Scene 1 (0–4s) ──────────────────────────────────────────
function Scene1() {
  const { localTime } = useSprite();
  const drawT = Math.min(1, localTime / 1.8);
  const wordOpacity = Math.max(0, Math.min(1, (localTime - 1.8) / 0.6));
  const exitOpacity = localTime > 3.4 ? Math.max(0, 1 - (localTime - 3.4) / 0.6) : 1;

  const camScale = interpolate(
    [0, 1.0, 1.8, 2.6, 4],
    [1.7, 1.55, 1.0, 1.0, 1.18],
    [Easing.easeOutCubic, Easing.easeInOutCubic, Easing.linear, Easing.easeInQuad]
  )(localTime);
  const blurAmt = localTime < 0.4 ? (1 - localTime / 0.4) * 6 : 0;

  return (
    <div style={{ position: 'absolute', inset: 0, background: PARCHMENT, opacity: exitOpacity, overflow: 'hidden' }}>
      <Camera scale={camScale} originX="50%" originY="46%" style={{ filter: blurAmt ? `blur(${blurAmt}px)` : 'none' }}>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
          <LogoDrawOn progress={drawT} scale={1.6} />
          <div style={{ marginTop: 28, fontFamily: 'Inter, system-ui, sans-serif', fontWeight: 600, fontSize: 56, color: NEAR_BLACK, opacity: wordOpacity, transform: `translateY(${(1 - wordOpacity) * 12}px)` }}>
            Outlined
          </div>
        </div>
      </Camera>
    </div>
  );
}

// ── Word-by-word natural reveal ─────────────────────────────
function WordReveal({ words, t, baseStart = 0, perWord = 0.13, dur = 0.85, color, accent, fontSize, fontWeight = 500 }) {
  return (
    <span>
      {words.map((w, i) => {
        const wStart = baseStart + i * perWord;
        const local = (t - wStart) / dur;
        const tt = clamp(local, 0, 1);
        const eased = 1 - Math.pow(1 - tt, 5);
        const opacity = eased;
        const seed = (i * 37) % 11;
        const ty = (1 - eased) * (10 + seed * 0.6);
        const tx = (1 - eased) * ((seed % 2 === 0 ? -1 : 1) * 4);
        const rot = (1 - eased) * ((seed % 2 === 0 ? -1 : 1) * 1.4);
        const bob = eased >= 1 ? Math.sin((t + i * 0.3) * 1.2) * 0.6 : 0;
        return (
          <span key={i} style={{
            display: 'inline-block',
            opacity,
            transform: `translate(${tx}px, ${ty + bob}px) rotate(${rot}deg)`,
            color,
            fontStyle: 'normal',
            fontWeight,
            fontSize,
            marginRight: '0.28em',
            willChange: 'transform, opacity',
          }}>{w}</span>
        );
      })}
    </span>
  );
}

// ── Scene 2 (4–9s) ──────────────────────────────────────────
function Scene2() {
  const { localTime } = useSprite();
  const fullTagline = 'One paste away.';
  const charDur = 0.07;
  const startTW = 2.4;
  const charsShown = Math.max(0, Math.floor((localTime - startTW) / charDur));
  const tagShown = fullTagline.slice(0, Math.min(charsShown, fullTagline.length));
  const cursorVisible = Math.floor(localTime * 1.6) % 2 === 0;
  const exitT = localTime > 5.4 ? Math.min(1, (localTime - 5.4) / 0.6) : 0;
  const exitTy = -exitT * 8;

  const camScale = interpolate(
    [0, 1.4, 3.2, 4.2, 5.0],
    [0.94, 1.0, 1.08, 1.14, 1.06],
    Easing.easeInOutCubic
  )(localTime);
  const ambientY = Math.sin(localTime * 0.7) * 3;

  const eyebrowT = clamp(localTime / 0.7, 0, 1);
  const eyebrowEase = 1 - Math.pow(1 - eyebrowT, 4);

  const headWords = ['A', 'library', 'of', 'citation', 'rules.'];
  const taglineWords = tagShown.split(' ');

  return (
    <div style={{ position: 'absolute', inset: 0, background: PARCHMENT, overflow: 'hidden' }}>
      <Camera scale={camScale} y={ambientY} originX="50%" originY="50%">
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 80px' }}>
      <div style={{ maxWidth: 1100, textAlign: 'center', opacity: 1 - exitT, transform: `translateY(${exitTy}px)` }}>
        <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontSize: 14, letterSpacing: 0, textTransform: 'uppercase', color: STONE, marginBottom: 28, opacity: eyebrowEase, transform: `translateY(${(1 - eyebrowEase) * 8}px)` }}>
          URL → Reference
        </div>
        <h1 style={{ fontFamily: 'Inter, system-ui, sans-serif', lineHeight: 1.1, letterSpacing: 0, margin: 0, color: NEAR_BLACK }}>
          <WordReveal words={headWords} t={localTime} baseStart={0.4} perWord={0.14} dur={0.9} color={NEAR_BLACK} fontSize={84} />
          <span style={{ display: 'inline-block', whiteSpace: 'nowrap' }}>
            {taglineWords.map((w, i) => (
              <span key={i} style={{
                display: 'inline-block',
                fontStyle: 'normal',
                color: TERRA,
                fontSize: 84,
                fontWeight: 500,
                marginRight: i < taglineWords.length - 1 ? '0.28em' : 0,
                opacity: 1,
                transform: `translateY(${Math.sin((localTime + i * 0.4) * 1.4) * 1.2}px)`,
              }}>{w}</span>
            ))}
            {localTime >= startTW && tagShown.length < fullTagline.length && (
              <span style={{ display: 'inline-block', width: '0.06em', height: '0.9em', verticalAlign: '-0.05em', background: TERRA, marginLeft: 2, opacity: cursorVisible ? 1 : 0 }} />
            )}
          </span>
        </h1>
      </div>
      </div>
      </Camera>
    </div>
  );
}

// ── Scene 3 (14–18s) ────────────────────────────────────────
function Scene3() {
  const { localTime } = useSprite();
  const styles = [
    { label: 'APA 7th', ref: <>Smith, J. A., &amp; Nguyen, T. (2024). On methods of citation. Journal of Library Studies, 12(3), 45–67. https://doi.org/10.1234/jls.2024.0045</> },
    { label: 'RMIT Harvard', ref: <>Smith JA &amp; Nguyen T 2024, &lsquo;On methods of citation&rsquo;, Journal of Library Studies, vol. 12, no. 3, pp. 45–67, doi:10.1234/jls.2024.0045.</> },
    { label: 'IEEE', ref: <>[1] J. A. Smith and T. Nguyen, &ldquo;On methods of citation,&rdquo; Journal of Library Studies, vol. 12, no. 3, pp. 45–67, 2024, doi: 10.1234/jls.2024.0045.</> },
  ];
  const slotDur = 1.33;
  const idx = Math.min(2, Math.floor(localTime / slotDur));
  const inSlot = (localTime - idx * slotDur) / slotDur;
  const fade = inSlot < 0.18 ? inSlot / 0.18 : inSlot > 0.82 ? Math.max(0, 1 - (inSlot - 0.82) / 0.18) : 1;
  const enterT = Math.min(1, localTime / 0.5);
  const exitT = localTime > 3.4 ? Math.min(1, (localTime - 3.4) / 0.5) : 0;

  const slotScale = interpolate([0, 0.18, 0.45, 1], [1.0, 1.12, 1.04, 1.04], [Easing.easeOutBack, Easing.easeOutCubic, Easing.linear])(inSlot);
  const chipOffsets = [-180, 0, 180];
  const camX = -chipOffsets[idx] * 0.35;

  return (
    <div style={{ position: 'absolute', inset: 0, background: PARCHMENT, opacity: enterT - exitT, overflow: 'hidden' }}>
      <Camera scale={slotScale} x={camX} originX="50%" originY="38%">
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 80px' }}>
      <div style={{ maxWidth: 980, width: '100%' }}>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginBottom: 36 }}>
          {styles.map((s, i) => (
            <div key={i} style={{
              padding: '12px 22px', borderRadius: 14,
              fontFamily: 'Inter, sans-serif', fontSize: 18, fontWeight: 500,
              background: i === idx ? TERRA : IVORY,
              color: i === idx ? IVORY : CHARCOAL,
              border: `1px solid ${i === idx ? TERRA : CREAM}`,
              boxShadow: i === idx ? '0 0 0 4px rgba(201,100,66,0.18)' : 'none',
              transition: 'all 0.4s ease',
            }}>{s.label}</div>
          ))}
        </div>
        <div style={{ background: IVORY, border: `1px solid ${CREAM}`, borderRadius: 24, padding: 36, boxShadow: 'rgba(0,0,0,0.04) 0px 8px 32px', minHeight: 120 }}>
          <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontSize: 12, letterSpacing: 0, textTransform: 'uppercase', color: STONE, marginBottom: 14 }}>
            Reference list entry
          </div>
          <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontSize: 22, lineHeight: 1.55, color: NEAR_BLACK, opacity: fade }}>
            {styles[idx].ref}
          </div>
        </div>
      </div>
      </div>
      </Camera>
    </div>
  );
}

// ── Scene 4 (18–22s) ────────────────────────────────────────
function Scene4() {
  const { localTime } = useSprite();
  const enterT = Math.min(1, localTime / 0.7);
  const subT = Math.max(0, Math.min(1, (localTime - 0.6) / 0.6));

  const camScale = interpolate([0, 1.4, 3.0, 4.0], [2.2, 1.0, 1.0, 1.06], [Easing.easeOutCubic, Easing.linear, Easing.easeInQuad])(localTime);
  const camY = interpolate([0, 1.4, 4.0], [60, 0, -20], Easing.easeOutCubic)(localTime);

  return (
    <div style={{ position: 'absolute', inset: 0, background: NEAR_BLACK, overflow: 'hidden' }}>
      <Camera scale={camScale} y={camY} originX="50%" originY="42%">
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 22, opacity: enterT, transform: `translateY(${(1 - enterT) * 14}px)` }}>
        <LogoDrawOn progress={1} scale={1.1} color={IVORY} accent={CORAL} />
        <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontWeight: 600, fontSize: 96, color: IVORY, letterSpacing: 0 }}>
          Outlined
        </div>
      </div>
      <div style={{ marginTop: 28, fontFamily: 'Inter, system-ui, sans-serif', fontStyle: 'normal', fontSize: 28, color: CORAL, opacity: subT, transform: `translateY(${(1 - subT) * 8}px)` }}>
        A library of citation rules.
      </div>
      <div style={{ marginTop: 56, fontFamily: 'Inter, system-ui, sans-serif', fontSize: 13, letterSpacing: 0, textTransform: 'uppercase', color: STONE, opacity: subT }}>
        outlined.app
      </div>
      </div>
      </Camera>
    </div>
  );
}

// ── Scene Scan (9–14s) ──────────────────────────────────────
function SceneScan() {
  const { localTime } = useSprite();

  const URL = 'nature.com/articles/citation-2024';
  const urlChars = clamp(localTime / 0.9, 0, 1);
  const urlShown = URL.slice(0, Math.floor(urlChars * URL.length));
  const urlCursor = Math.floor(localTime * 2.4) % 2 === 0 && localTime < 1.0;

  const beamP = clamp((localTime - 1.4) / 1.8, 0, 1);
  const beamVisible = localTime >= 1.2 && localTime < 3.4;

  const tags = [
    { y: 90,  label: 'TITLE',   value: 'On methods of citation', threshold: 0.18 },
    { y: 165, label: 'AUTHORS', value: 'Smith, J. A.; Nguyen, T.', threshold: 0.34 },
    { y: 240, label: 'JOURNAL', value: 'Journal of Library Studies', threshold: 0.52 },
    { y: 315, label: 'YEAR',    value: '2024',                 threshold: 0.66 },
    { y: 390, label: 'DOI',     value: '10.1234/jls.2024.0045', threshold: 0.82 },
  ];

  const collapseT = clamp((localTime - 3.4) / 0.7, 0, 1);
  const collapseEase = Easing.easeInOutCubic(collapseT);

  const enterT = clamp(localTime / 0.4, 0, 1);
  const exitT = localTime > 4.4 ? clamp((localTime - 4.4) / 0.6, 0, 1) : 0;

  const camScale = interpolate([0, 1.0, 3.4, 4.4, 5.0], [1.04, 0.98, 0.98, 1.02, 0.98], Easing.easeInOutCubic)(localTime);

  return (
    <div style={{ position: 'absolute', inset: 0, background: PARCHMENT, overflow: 'hidden', opacity: enterT - exitT }}>
      <Camera scale={camScale} originX="50%" originY="50%">
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 80px', gap: 48 }}>

        <div style={{ position: 'relative', width: 760, height: 560, background: IVORY, border: `1px solid ${CREAM}`, borderRadius: 18, boxShadow: 'rgba(0,0,0,0.06) 0px 12px 40px', overflow: 'hidden', transform: `translateX(${collapseEase * -40}px) scale(${1 - collapseEase * 0.04})`, opacity: 1 - collapseEase * 0.25 }}>
          <div style={{ height: 44, background: '#ece9e0', borderBottom: `1px solid ${CREAM}`, display: 'flex', alignItems: 'center', padding: '0 16px', gap: 8 }}>
            <div style={{ width: 11, height: 11, borderRadius: 11, background: '#e96e63' }} />
            <div style={{ width: 11, height: 11, borderRadius: 11, background: '#e6b545' }} />
            <div style={{ width: 11, height: 11, borderRadius: 11, background: '#7ec07e' }} />
            <div style={{ marginLeft: 16, flex: 1, height: 26, background: PARCHMENT, borderRadius: 6, display: 'flex', alignItems: 'center', padding: '0 12px', fontFamily: 'Inter, system-ui, sans-serif', fontSize: 13, color: CHARCOAL }}>
              {urlShown}{urlCursor && <span style={{ display: 'inline-block', width: 1, height: 14, background: CHARCOAL, marginLeft: 1 }} />}
            </div>
          </div>
          <div style={{ padding: '32px 40px', position: 'relative', height: 'calc(100% - 44px)' }}>
            <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontSize: 26, fontWeight: 600, color: NEAR_BLACK, marginBottom: 14, lineHeight: 1.25 }}>On methods of citation</div>
            <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 13, color: STONE, marginBottom: 20 }}>Smith, J. A. &middot; Nguyen, T. &middot; Journal of Library Studies &middot; 2024</div>
            {[0,1,2,3,4,5,6].map(i => (
              <div key={i} style={{ height: 8, borderRadius: 4, background: '#e8e5db', marginBottom: 12, width: `${88 - (i % 3) * 12}%` }} />
            ))}
            <div style={{ height: 100, marginTop: 18, background: '#ede9de', borderRadius: 6 }} />
            {[0,1,2,3].map(i => (
              <div key={'b'+i} style={{ height: 8, borderRadius: 4, background: '#e8e5db', marginTop: 12, width: `${85 - i * 7}%` }} />
            ))}

            {beamVisible && (
              <>
                <div style={{
                  position: 'absolute', left: 0, right: 0,
                  top: `${beamP * 100}%`,
                  height: 4, background: TERRA,
                  boxShadow: `0 0 24px 4px ${TERRA}, 0 0 60px 8px ${CORAL}`,
                  zIndex: 5,
                }} />
                <div style={{
                  position: 'absolute', left: 0, right: 0, top: 0,
                  height: `${beamP * 100}%`,
                  background: 'linear-gradient(180deg, rgba(201,100,66,0.0) 0%, rgba(201,100,66,0.06) 90%, rgba(201,100,66,0.14) 100%)',
                  pointerEvents: 'none',
                  zIndex: 4,
                }} />
              </>
            )}

            {tags.map((tag, i) => {
              const popped = beamP >= tag.threshold;
              const popLocal = clamp((beamP - tag.threshold) / 0.08, 0, 1);
              const popEase = Easing.easeOutBack(popLocal);
              if (!popped) return null;
              const cx = collapseEase * 520;
              const cy = collapseEase * (240 - tag.y);
              return (
                <div key={i} style={{
                  position: 'absolute', top: tag.y, right: 24,
                  background: NEAR_BLACK, color: IVORY,
                  padding: '6px 12px', borderRadius: 8,
                  fontFamily: 'Inter, system-ui, sans-serif', fontSize: 11, letterSpacing: 0,
                  display: 'flex', alignItems: 'center', gap: 8,
                  opacity: popEase * (1 - collapseEase * 0.4),
                  transform: `translate(${cx}px, ${cy}px) scale(${0.6 + popEase * 0.4})`,
                  transformOrigin: 'right center',
                  zIndex: 6,
                  boxShadow: '0 4px 16px rgba(20,20,19,0.25)',
                }}>
                  <span style={{ color: CORAL, fontWeight: 600 }}>{tag.label}</span>
                  <span style={{ color: IVORY, fontFamily: 'Inter, sans-serif', fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>{tag.value}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ width: 460, display: 'flex', flexDirection: 'column', gap: 18 }}>
          <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontSize: 13, letterSpacing: 0, textTransform: 'uppercase', color: TERRA }}>
            {localTime < 1.0 ? '01 — PASTE URL' : localTime < 3.4 ? '02 — SCANNING METADATA' : '03 — REFERENCE READY'}
          </div>
          <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontSize: 38, fontWeight: 600, lineHeight: 1.15, color: NEAR_BLACK, letterSpacing: 0 }}>
            {localTime < 3.4 ? <>Reads the page like a librarian.</> : <>Source captured.</>}
          </div>
          <div style={{
            marginTop: 12,
            background: IVORY, border: `1px solid ${CREAM}`, borderRadius: 18, padding: 24,
            boxShadow: collapseEase > 0 ? 'rgba(0,0,0,0.08) 0px 16px 48px' : 'rgba(0,0,0,0.03) 0px 4px 16px',
            opacity: 0.4 + collapseEase * 0.6,
            transform: `scale(${0.96 + collapseEase * 0.04})`,
            transition: 'all 0.2s ease',
          }}>
            <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontSize: 11, letterSpacing: 0, textTransform: 'uppercase', color: STONE, marginBottom: 12 }}>
              Reference list entry
            </div>
            <div style={{ fontFamily: 'Inter, system-ui, sans-serif', fontSize: 17, lineHeight: 1.55, color: NEAR_BLACK, opacity: collapseEase }}>
              Smith, J. A., &amp; Nguyen, T. (2024). On methods of citation. Journal of Library Studies, 12(3), 45–67.
            </div>
            {collapseEase < 1 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, opacity: 1 - collapseEase, fontFamily: 'Inter, system-ui, sans-serif', fontSize: 12, color: STONE, letterSpacing: 0 }}>
                <div style={{ width: 10, height: 10, borderRadius: 10, border: `2px solid ${TERRA}`, borderTopColor: 'transparent', animation: 'spin 0.8s linear infinite' }} />
                {localTime < 1.0 ? 'Awaiting URL…' : 'Extracting metadata…'}
              </div>
            )}
          </div>
        </div>

      </div>
      </Camera>
      <style>{`@keyframes spin { to { transform: rotate(360deg) } }`}</style>
    </div>
  );
}

function Film() {
  return (
    <>
      <Sprite start={0} end={4}><Scene1 /></Sprite>
      <Sprite start={4} end={9}><Scene2 /></Sprite>
      <Sprite start={9} end={14}><SceneScan /></Sprite>
      <Sprite start={14} end={18}><Scene3 /></Sprite>
      <Sprite start={18} end={22}><Scene4 /></Sprite>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <Stage width={1920} height={1080} duration={22} background={PARCHMENT} fps={60} showControls={false}>
    <Film />
  </Stage>
);
</script>
</body>
</html>
